# =============================================================================
# SurpriseMoi Backend - Docker Compose Configuration
# Domain: dashboard.surprisemoi.com
# Port: 8082 (avoiding 8080 and 8081 which are already in use)
# Note: Scheduler runs via VPS cron, not Docker container
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Laravel Application
  # ---------------------------------------------------------------------------
  app:
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    #   target: production
    image: shinsenter/laravel:dev-php8.2
    # container_name: surprisemoi-app
    restart: unless-stopped
    # ports:
    #   - '8082:80'
    #   - '5173:5173' # Vite development server port
    # env_file:
    #   - .env
    environment:
      - CONTAINER_ROLE=app
      - DB_HOST=db
      - DB_HOSTNAME=${DB_HOST:-db}
      - DOCKER_USE_VITE_CONFIG=${DOCKER_USE_VITE_CONFIG:-true}
    volumes:
      # Persist storage for logs and uploads
      - ./:/var/www/html/
      - app-storage:/var/www/html/storage/app
      - app-logs:/var/www/html/storage/logs
      - /var/www/html/vendor
      - /var/www/html/node_modules
      # - /dev/null:/var/www/html/.env
      - /var/www/html/.git

    networks:
      - surprisemoi-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # command: >
    #   sh -c "
    #     apk add nodejs npm
    #     npm install &&
    #     npm run build &&
    #     ./docker/entrypoint.sh
    #   "
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost/up']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    # develop:
    #   watch:
    #     - action: sync
    #       path: ./
    #       target: ${APP_PATH:-/var/www/html}/
    #       ignore:
    #         - vendor/
    #         - node_modules/
    #         - storage/app/
    #         - storage/logs/
    #     - action: rebuild
    #       path: Dockerfile

  # ---------------------------------------------------------------------------
  # Queue Worker Service
  # ---------------------------------------------------------------------------
  queue:
    extends:
      service: app
    container_name: surprisemoi-queue
    command:
      [
        '/usr/bin/sh',
        '-c',
        'php artisan queue:work redis --queue=emails,tokens,default --sleep=3 --tries=3 --max-time=3600',
      ]
    environment:
      - CONTAINER_ROLE=queue
    depends_on: []
    healthcheck:
      test:
        [
          'CMD',
          'php',
          'artisan',
          'queue:work',
          '--once',
          '--queue=emails,tokens,default',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: surprisemoi-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-surprise_moi_db}
      POSTGRES_USER: ${DB_USERNAME:-laraveluser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-Gilash@123}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - surprisemoi-network
    # ports:
    #   - '54322:5432' # External port for direct access if needed
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${DB_USERNAME:-laraveluser} -d ${DB_DATABASE:-surprise_moi_db}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Redis Cache
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: surprisemoi-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-Gilash@123}
    volumes:
      - redis-data:/data
    networks:
      - surprisemoi-network
    # ports:
    #   - '63792:6379' # External port for direct access if needed
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-Gilash@123}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  caddy:
    image: serfriz/caddy-crowdsec-geoip-ratelimit-security-dockerproxy:2.10 # Use a lightweight Caddy image
    restart: unless-stopped
    labels:
      caddy.0_debug: ''
      caddy.1_metrics.per_host: ''
      caddy.2_log: ''
      caddy.2_log.format: 'json'
      caddy.2_log.output: 'stdout'
      caddy_3: (c_caddy_waf)
      caddy_3.@nothing: |
        # nothing here


    ports:
      - '80:80' # Map host port 8000 to container port 80
      - '443:443' # Map host port 8443 to container port 443 for HTTPS (optional)
      - '443:443/udp'# Map host port 8443 to container port 443 for HTTPS (optional, UDP for ACME challenges)
    volumes:
      - caddy_data:/data # Persist Caddy data (certificates, etc.)
      - caddy_config:/config # Persist Caddy configuration
      - /var/run/docker.sock:/var/run/docker.sock # Mount Docker socket for Caddy Docker Proxy
    environment:
      CADDY_DOCKER_PROXY_LABELS: 'true' # Enable Caddy Docker Proxy
      CADDY_DOCKER_POLLING_INTERVAL: '2s'
      CADDY_DOCKER_EVENT_THROTTLE_INTERVAL: '2s'
      ENV: '/root/.shrc'
    deploy:
      resources:
        limits:
          cpus: 0.2 # Limit CPU usage to 50%
          memory: 128M # Limit memory usage to 512MB
        reservations:
          cpus: '0.01' # Reserve 10% of CPU
          memory: 48M # Reserve 256MB of memory
    post_start:
      - command: >
          sh -c "(echo \"container post_start:initializing ...\" &&
          echo \"alias c='cat \$(find /config -name Caddyfile.autosave)'\" >> ~/.shrc &&
          echo \"alias c_tf='tail -f \$(find /config -name Caddyfile.autosave)'\" >> ~/.shrc &&
          echo \"container post_start:done ...\") > /proc/1/fd/1 2> /proc/1/fd/2 &&
          tail -s2 -f $(find /config -name Caddyfile.autosave) > /proc/1/fd/1 2> /proc/1/fd/2 & "
    networks:
      - surprisemoi-network

# =============================================================================
# Networks
# =============================================================================
networks:
  surprisemoi-network:
    driver: bridge
    name: surprisemoi-network

# =============================================================================
# Volumes
# =============================================================================
volumes:
  db-data:
    name: surprisemoi-db-data
  redis-data:
    name: surprisemoi-redis-data
  app-storage:
    name: surprisemoi-app-storage
  app-logs:
    name: surprisemoi-app-logs
  caddy_data:
  caddy_config:
